<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - SVCDA</title>
    <link rel="shortcut icon" href="../assets/images/LOGO.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <style>
        .emp-login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .emp-login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .emp-login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .emp-login-header img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .emp-login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .emp-login-header p {
            color: #666;
            font-size: 14px;
        }
        .emp-form-group {
            margin-bottom: 20px;
        }
        .emp-form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .emp-form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .emp-form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .emp-login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .emp-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .emp-error-msg {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .emp-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .emp-links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .emp-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="emp-login-wrapper">
    <div class="emp-login-card">
        <div class="emp-login-header">
            <img src="../assets/images/LOGO.png" alt="SVCDA Logo">
            <h1>Employee Login</h1>
            <p>Access your employee dashboard</p>
        </div>

        <div class="emp-error-msg" id="empErrorMsg"></div>

        <form onsubmit="handleEmployeeLogin(event)">
            <div class="emp-form-group">
                <label for="empEmail">Email Address</label>
                <input type="email" id="empEmail" required placeholder="employee@svcda.in">
            </div>

            <div class="emp-form-group">
                <label for="empPassword">Password</label>
                <input type="password" id="empPassword" required placeholder="Enter your password">
            </div>

            <button type="submit" class="emp-login-btn">Login to Dashboard</button>
        </form>

        <div class="emp-links">
            <a href="../pages/admin.html">Admin Login</a> | 
            <a href="../index.html">Back to Home</a>
        </div>
    </div>
</div>

<script>
// Check if already logged in
if (auth.isLoggedIn()) {
    window.location.href = 'employee-dashboard.html';
}

// Handle employee login with Supabase
async function handleEmployeeLogin(e) {
    e.preventDefault();
    
    const email = document.getElementById('empEmail').value.trim();
    const password = document.getElementById('empPassword').value;
    const errorMsg = document.getElementById('empErrorMsg');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    
    // Disable submit button during login
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in...';
    
    try {
        // Use auth.login from supabase-config.js
        const employee = await auth.login(email, password);
        
        // Redirect to employee dashboard
        window.location.href = 'employee-dashboard.html';
        
    } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = '❌ ' + (error.message || 'Invalid email or password');
        errorMsg.style.display = 'block';
        
        // Re-enable submit button
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login to Dashboard';
        
        setTimeout(() => {
            errorMsg.style.display = 'none';
        }, 3000);
    }
}

// Display test credentials in console (for development)
window.addEventListener('load', () => {
    console.log('Test Employee Credentials:');
    console.log('Email: employee@svcda.in, Password: emp123');
    console.log('Email: sarah@svcda.in, Password: emp123');
});
</script>

</body>
</html>
